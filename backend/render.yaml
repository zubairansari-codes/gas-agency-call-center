services:
  - type: web
    name: gas-agency-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        fromSecret: JWT_SECRET
      - key: DATABASE_URL
        fromDatabase:
          name: gas-agency-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    autoDeploy: true

databases:
  - name: gas-agency-db
    databaseName: gas_agency
    user: postgres
    plan: free
    region: oregon
    version: "15"
